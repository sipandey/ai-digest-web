# AI Digest pipeline
#
# Required GitHub secrets:
#   OPENAI_API_KEY            — shared across all users for GPT-4o-mini scoring
#   SUPABASE_URL              — project URL  (e.g. https://xyz.supabase.co)
#   SUPABASE_SERVICE_ROLE_KEY — service role key, bypasses RLS
#
# Notion tokens and database IDs are stored per-user in Supabase
# and are NOT stored as GitHub secrets.
#
# How per-user scheduling works
# ──────────────────────────────
# The 'check' job runs at the top of every UTC hour. It takes ~15 seconds
# and costs essentially nothing. It queries Supabase for users whose
# stored digest_hour and timezone_offset map to the current UTC hour:
#
#   target_utc_hour = (round_half_away(digest_hour − timezone_offset) % 24 + 24) % 24
#
# round_half_away rounds 0.5 away from zero so half-hour timezone offsets
# (e.g. IST UTC+5:30 stored as 5.5) map to a deterministic UTC hour that
# is consistent between the jq gate and Python's _is_user_due().
#
# If no users are due the workflow exits immediately — the heavy 'pipeline'
# job never starts. If users are due, the 'pipeline' job starts and only
# processes those users.
#
# Logging:
#   pipeline.py detects GITHUB_ACTIONS=true and emits structured JSON.
#   Filter the raw step log with jq, e.g.:
#     jq 'select(.level == "ERROR")'
#     jq 'select(.message == "Pipeline complete") | {users_succeeded, users_failed}'

name: Pipeline

on:
  schedule:
    - cron: "0 * * * *"   # top of every UTC hour; 'check' job gates the rest
  workflow_dispatch:
    inputs:
      user_id:
        description: "Optional: process only this user_id"
        required: false
        type: string
      run_date:
        description: "Optional: run date override (YYYY-MM-DD)"
        required: false
        type: string

concurrency:
  # One scheduled run at a time; manual dispatches get their own group so
  # they never block or get blocked by the scheduled job.
  group: pipeline-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: read

# ── Job 1: fast gate — check if any users are due right now ──────────────────
#
# Uses curl + jq (pre-installed on ubuntu-latest). No Python, no pip.
# Exits in ~15 seconds. Only sets users_due > 0 when work is needed.
# On workflow_dispatch the check is skipped — all users (or the specified
# one) are processed immediately.

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      users_due: ${{ steps.count.outputs.users_due }}
      utc_hour:  ${{ steps.count.outputs.utc_hour }}

    steps:
      - name: Count users due at this UTC hour
        id: count
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Current UTC hour as a plain integer (no leading zero).
          # Captured ONCE here so the pipeline job uses the same value —
          # job startup (checkout + pip install) adds 2-5 min and would
          # otherwise push Python into the next clock hour, causing users
          # due at the current hour to be skipped.
          UTC_HOUR=$(date -u +%-H)
          echo "Current UTC hour: $UTC_HOUR"
          echo "utc_hour=${UTC_HOUR}" >> "$GITHUB_OUTPUT"

          # Manual dispatches always proceed — skip the time check.
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Manual dispatch — skipping time filter"
            echo "users_due=forced" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch all active users that have Notion connected.
          # Only the two scheduling fields are needed — keep the payload small.
          RESPONSE=$(curl -sf \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/user_configs?select=digest_hour,timezone_offset&active=eq.true&notion_connected=eq.true")

          if [[ $? -ne 0 ]]; then
            echo "Supabase query failed — letting pipeline run to surface the error"
            echo "users_due=fallback" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Previous UTC hour (wraps midnight: 0 → 23).
          # Used to catch users missed when GitHub Actions delays a cron run
          # past the top of the intended hour (delays of 30-60+ min are common).
          # Python uses the same two-hour window and guards against double-delivery
          # by checking whether the user already has a successful run today.
          PREV_HOUR=$(( (UTC_HOUR - 1 + 24) % 24 ))
          echo "Previous UTC hour (catch-up): $PREV_HOUR"

          # Count users whose (digest_hour - timezone_offset) rounds to UTC_HOUR
          # OR PREV_HOUR.
          #
          # Round BEFORE the modulo — jq's % truncates floats to integers before
          # performing the division, so 1.5 % 24 = 1, not 1.5. Rounding first
          # (1.5 | round = 2, then 2 % 24 = 2) matches Python's behaviour.
          # jq uses "round half away from zero" (2.5→3); Python is updated to match.
          #
          # The double-mod ((x % 24) + 24) % 24 keeps the result positive even
          # when digest_hour < timezone_offset (e.g. 1am UTC+8 → 17:00 UTC).
          # tonumber coercion: Supabase returns NUMERIC columns as JSON strings
          # (e.g. "5.50" not 5.5). tonumber handles both strings and numbers so
          # the formula keeps working even during a migration window where some
          # rows still have the old NUMERIC type.
          COUNT=$(echo "$RESPONSE" | jq --argjson h "$UTC_HOUR" --argjson p "$PREV_HOUR" \
            '[.[] | select(
               ( (((( ((.digest_hour // 7) | tonumber) - ((.timezone_offset // "0") | tonumber) ) | round) % 24 + 24) % 24) as $t
               | $t == $h or $t == $p )
             )] | length')

          echo "Users due at UTC ${PREV_HOUR}:00–${UTC_HOUR}:59 → ${COUNT}"
          echo "users_due=${COUNT}" >> "$GITHUB_OUTPUT"

# ── Job 2: full pipeline — only runs when users are actually due ──────────────

  pipeline:
    needs: check
    # Run when check found due users (numeric > 0) OR was forced/fallback.
    if: >-
      needs.check.outputs.users_due != '0' &&
      needs.check.outputs.users_due != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NOTION_TOKEN_ENCRYPTION_KEY: ${{ secrets.NOTION_TOKEN_ENCRYPTION_KEY }}
          PIPELINE_USER_ID: ${{ github.event.inputs.user_id }}
          PIPELINE_RUN_DATE: ${{ github.event.inputs.run_date }}
          # Batch API disabled: at small user counts the 50% cost saving is
          # negligible and the OpenAI queue can stall a job for hours, causing
          # a TimeoutError that fails the entire user run. Re-enable once user
          # count is large enough that the savings justify the latency risk:
          #   PIPELINE_USE_BATCH: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          PIPELINE_USE_BATCH: 'false'
          # Manual dispatches skip the per-user time filter — run everyone now.
          # Scheduled runs apply it — check job already confirmed users are due,
          # but pipeline.py re-checks to handle edge cases (e.g. concurrent runs).
          PIPELINE_SKIP_TIME_FILTER: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          # Pass the UTC hour captured by the check job so pipeline.py uses the
          # same value — avoids skipping users when job startup (checkout + pip)
          # pushes execution into the next clock hour.
          PIPELINE_UTC_HOUR: ${{ needs.check.outputs.utc_hour }}
        run: python pipeline.py
