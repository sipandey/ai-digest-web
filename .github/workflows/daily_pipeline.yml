# Daily AI Digest pipeline
#
# Required GitHub secrets:
#   OPENAI_API_KEY          — shared across all users for GPT-4o-mini scoring
#   SUPABASE_URL            — project URL, used to read user configs and write run results
#   SUPABASE_SERVICE_ROLE_KEY — service role key, bypasses RLS for pipeline operations
#
# Notion tokens and database IDs are stored per-user in Supabase (user_configs table)
# and are NOT stored as GitHub secrets.
#
# Logging:
#   The pipeline detects GITHUB_ACTIONS=true (set automatically by the runner)
#   and switches to structured JSON output. Each log line is a self-contained
#   JSON object with fields like run_date, user_id, papers_fetched, papers_passed,
#   top_score, and error. You can filter the raw step log with:
#
#     jq 'select(.level == "ERROR")'              # surface failures
#     jq 'select(.message == "Pipeline complete") | {users_failed}'
#     jq '[.papers_fetched, .papers_passed]'       # coverage ratio

name: Daily Pipeline

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC — digest ready before local 7am in all timezones
  workflow_dispatch:
    inputs:
      user_id:
        description: "Optional user_id to process"
        required: false
        type: string
      run_date:
        description: "Optional run date (YYYY-MM-DD)"
        required: false
        type: string

concurrency:
  group: daily-pipeline
  cancel-in-progress: false  # never cancel a run in progress; let it finish

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPELINE_USER_ID: ${{ github.event.inputs.user_id }}
          PIPELINE_RUN_DATE: ${{ github.event.inputs.run_date }}
          # Use the Batch API (50% cost) for scheduled runs only.
          # workflow_dispatch covers both the "Run now" button and manual
          # GitHub Actions triggers — both need a fast synchronous response.
          PIPELINE_USE_BATCH: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: python pipeline.py
